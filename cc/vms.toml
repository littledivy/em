# VMs where workers run. localhost = the box that orchestrator runs on.
# Each VM declares which CLIs it can launch; spawn_worker picks the
# least-loaded VM that supports the requested CLI.
#
# Per-VM prereqs (when host != localhost):
#   - reachable via ssh (key-auth) at user@host[:port]
#   - gh authed as divybot WITH `gh auth setup-git` so plain HTTPS pushes work
#   - chosen CLI binaries on PATH; each authed (claude /login, codex login,
#     GEMINI_API_KEY env)
#   - tmux + git on PATH
#   - if build_prefix uses nix: nix installed; else system cargo + linker work
#   - if sccache=true: sccache binary on PATH
#   - if unclaw_wrap=true: unclaw cli on PATH and authed
#   - directories at wt_base + deno_src, deno_src is a clone of denoland/deno

[[vm]]
name     = "localhost"
host     = "localhost"
capacity = 8
clis     = ["claude"]
wt_base = "~/src/deno-wt"
deno_src = "~/src/deno"
build_prefix = "nix develop -c"
sccache = true
sccache_dir = "~/.cache/sccache"
sccache_cache_size = "60G"
unclaw_wrap = false

# Codex on the same mac mini. KEEP capacity=0 — operator's codex quota is
# exhausted and we've hit rate-limit prompts that hang panes mid-tick.
# Do not bump without explicit operator approval.
[[vm]]
name     = "local-codex"
host     = "localhost"
capacity = 0
clis     = ["codex"]
wt_base  = "~/src/deno-wt"
deno_src = "~/src/deno"
build_prefix = "nix develop -c"
sccache  = true
sccache_dir = "~/.cache/sccache"
sccache_cache_size = "60G"
unclaw_wrap = false

