# bot0 + bot1 share vm.littledivy.com (one box, two ssh users). `name`
# disambiguates them in the DB / registry / tmux session prefix; `host` is
# the DNS/IP used for ssh.
[[vm]]
name     = "bot0"
host     = "vm.littledivy.com"
user     = "bot0-linux"
port     = 22
capacity = 0  # codex disabled (operator out of quota — see local-codex note)
clis     = ["codex"]
wt_base  = "~/src/deno-wt"
deno_src = "~/src/deno"
build_prefix = ""
sccache  = true
sccache_dir = "~/.cache/sccache"
sccache_cache_size = "60G"
unclaw_wrap = true

# bot1: capacity=0 until `codex login` is run on the VM (~/.codex/ is empty,
# so the codex binary just exits and the prompt falls into bash).
[[vm]]
name     = "bot1"
host     = "vm.littledivy.com"
user     = "bot1-linux"
port     = 22
capacity = 0  # codex disabled (operator out of quota — see local-codex note)
clis     = ["codex"]
wt_base  = "~/src/deno-wt"
deno_src = "~/src/deno"
build_prefix = ""
sccache  = true
sccache_dir = "~/.cache/sccache"
sccache_cache_size = "60G"
unclaw_wrap = true
